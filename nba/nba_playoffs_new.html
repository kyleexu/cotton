<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA 季后赛对战图</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --card: #ffffff;
            --text: #12263a;
            --muted: #5c6b7a;
            --accent: #1f7a8c;
            --accent-2: #ff7f11;
            --line: #d6dde7;
            --line-clr: rgba(31, 122, 140, 0.30);
            --surface-soft: #f8fbff;
            --shadow-soft: 0 8px 22px rgba(18, 38, 58, 0.06);
            --cell-h: 104px;
            --team-w: 120px;
            --conn-w: 28px;
            --round-w: 110px;
            --center-gap-w: 6px;
            --outer-gap-w: 18px;
            --champ-w: 140px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #f7f9fd 0%, #ffffff 180px);
            line-height: 1.5;
        }

        /* ── Section container ── */
        .container {
            padding: 28px 20px 32px;
        }

        section {
            padding: 16px;
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════
           BRACKET GRID — the "Excel sheet"
           ══════════════════════════════════════
           25 columns × (1 header + 8 data) rows.
           Every element sits at an explicit grid cell.
        */
        .bracket-grid {
            display: grid;
            grid-template-columns:
                var(--team-w)
                /* 1  wp-team  */
                var(--conn-w)
                /* 2  wp-conn  */
                var(--round-w)
                /* 3  wp-result */
                var(--outer-gap-w)
                /* 4  gap1 */
                var(--team-w)
                /* 5  wr1-team */
                var(--conn-w)
                /* 6  wr1-conn */
                var(--round-w)
                /* 7  wr1-win  */
                var(--conn-w)
                /* 8  ws-conn  */
                var(--round-w)
                /* 9  ws-win   */
                var(--conn-w)
                /* 10 wf-conn  */
                var(--round-w)
                /* 11 wf-champ */
                var(--center-gap-w)
                /* 12 gap2 */
                var(--champ-w)
                /* 13 champ    */
                var(--center-gap-w)
                /* 14 gap3 */
                var(--round-w)
                /* 15 ef-champ */
                var(--conn-w)
                /* 16 ef-conn  */
                var(--round-w)
                /* 17 es-win   */
                var(--conn-w)
                /* 18 es-conn  */
                var(--round-w)
                /* 19 er1-win  */
                var(--conn-w)
                /* 20 er1-conn */
                var(--team-w)
                /* 21 er1-team */
                var(--outer-gap-w)
                /* 22 gap4 */
                var(--round-w)
                /* 23 ep-result */
                var(--conn-w)
                /* 24 ep-conn  */
                var(--team-w);
            /* 25 ep-team  */
            grid-template-rows:
                auto repeat(8, var(--cell-h));
            row-gap: 8px;
            width: max-content;
            transform-origin: top left;
        }

        /* ── Header labels ── */
        .grid-header {
            grid-row: 1;
            font-size: 1.06rem;
            font-weight: 700;
            color: #1f3448;
            padding: 0 0 8px;
            white-space: nowrap;
        }

        /* ── Generic cell wrapper ── */
        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        /* ── Card base ── */
        .team-card,
        .win-card,
        .semi-card,
        .champ-card {
            border: 1px solid rgba(196, 207, 221, .5);
            border-radius: 10px;
            background: var(--surface-soft);
            padding: 8px 12px;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.25;
            box-shadow: var(--shadow-soft);
            width: 100%;
            height: fit-content;
            transition: opacity 120ms ease, background-color 120ms ease,
                box-shadow 120ms ease, transform 120ms ease;
        }

        .team-line {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
        }

        .team-name {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.2;
        }

        .team-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .seed {
            display: block;
            color: var(--muted);
            font-size: .8rem;
            text-align: center;
            line-height: 1.2;
        }

        .selectable-option {
            cursor: pointer;
            user-select: none;
            transition: transform 120ms ease, color 120ms ease, opacity 120ms ease;
        }

        .selectable-option:hover {
            color: var(--accent);
            transform: translateY(-1px);
        }

        .selectable-option.is-selected {
            color: var(--accent-2);
            opacity: 1;
            filter: saturate(1);
            background: rgba(255, 127, 17, .11);
            box-shadow: inset 0 0 0 1px rgba(255, 127, 17, .32), 0 6px 16px rgba(255, 127, 17, .16);
        }

        .selectable-option:focus-visible {
            outline: 2px solid rgba(31, 122, 140, .45);
            outline-offset: 2px;
        }

        .empty-slot {
            color: var(--muted);
            opacity: .8;
            font-weight: 600;
            letter-spacing: .02em;
        }

        .team-card:has(.empty-slot),
        .win-card:has(.empty-slot),
        .semi-card:has(.empty-slot),
        .champ-card:has(.empty-slot) {
            opacity: .68;
            background: #fbfdff;
            box-shadow: none;
        }

        /* ── NBA Champion (center) ── */
        .league-champion {
            padding: 14px 10px;
            border-radius: 10px;
            width: calc(var(--round-w) * 2 + var(--center-gap-w));
            max-width: calc(var(--round-w) * 2 + var(--center-gap-w));
            min-height: 148px;
        }

        .league-champion .team-logo {
            width: 96px;
            height: 96px;
        }

        .league-champion .team-name {
            font-size: 1.08rem;
        }

        .conference-champion {
            width: calc(100% + 48px);
            max-width: 158px;
        }

        .conference-champion--west {
            transform: translate(24px, 0);
        }

        .conference-champion--east {
            transform: translate(-24px, 0);
        }

        .conference-champion--west:hover {
            transform: translate(24px, -1px);
        }

        .conference-champion--east:hover {
            transform: translate(-24px, -1px);
        }

        /* ═══════════════════════════════════
           CONNECTOR LINES  (CSS borders)
           ═══════════════════════════════════
           .conn-r1     — spans 2 rows (first round pair)
           .conn-semi   — spans 4 rows
           .conn-final  — spans 8 rows
           .conn-playin — spans 2 rows (play-in pair)

           Arms: ::after = top arm, .arm-bottom = bottom arm
           ::before = vertical bar connecting the two arms
           West: arms extend RIGHT (left:50% → right:0)
           East (.conn-east): arms extend LEFT (left:0 → right:50%)
        */
        .conn {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .conn::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 25%;
            height: 50%;
            width: 1px;
            background: var(--line-clr);
        }

        .conn::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 0;
            right: 50%;
            height: 1px;
            background: var(--line-clr);
        }

        .conn .arm-bottom {
            position: absolute;
            bottom: 25%;
            left: 0;
            right: 50%;
            height: 1px;
            background: var(--line-clr);
        }

        /* Middle arm: from vertical bar center toward the winner card */
        .conn .arm-mid {
            position: absolute;
            top: 50%;
            left: 50%;
            right: 0;
            height: 1px;
            background: var(--line-clr);
        }

        /* East side: arms go RIGHT (toward teams on the right) */
        .conn-east::after {
            left: 50%;
            right: 0;
        }

        .conn-east .arm-bottom {
            left: 50% !important;
            right: 0 !important;
        }

        .conn-east .arm-mid {
            left: 0 !important;
            right: 50% !important;
        }



        /* ── Responsive ── */
        @media (max-width: 640px) {
            :root {
                --cell-h: 88px;
            }

            section {
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <section>
            <div class="bracket-grid" id="bracket-grid">

                <!-- ═══ ROW 1: HEADER LABELS ═══ -->
                <div class="grid-header" style="grid-row:1; grid-column:1/4;">西部附加赛</div>
                <div class="grid-header" style="grid-row:1; grid-column:5;">西部</div>
                <div class="grid-header"
                    style="grid-row:1; grid-column:11/16; text-align:center; line-height:1; padding-bottom:2px;">总冠军
                </div>
                <div class="grid-header" style="grid-row:1; grid-column:21; text-align:right;">东部</div>
                <div class="grid-header" style="grid-row:1; grid-column:23/26; text-align:right;">东部附加赛</div>

                <!-- Vertical dividers between play-in and bracket -->
                <div style="grid-row:1/11; grid-column:4; border-right:1px solid var(--line); justify-self:center;">
                </div>
                <div style="grid-row:1/11; grid-column:22; border-left:1px solid var(--line); justify-self:center;">
                </div>

                <!-- ═══════════════════════════════════════
                     WEST PLAY-IN  (cols 1-3, rows 2-7)
                     g78: rows 2-3, g910: rows 4-5, g8: rows 6-7
                     ═══════════════════════════════════════ -->
                <!-- g78: Suns vs Blazers -->
                <div class="cell" style="grid-row:2; grid-column:1;">
                    <div class="team-card selectable-option is-selected" data-playin-conf="west" data-playin-game="g78"
                        data-team="suns" tabindex="0" role="button" aria-label="选择太阳赢下西部7/8附加赛">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612756/global/L/logo.svg"
                                alt="太阳 logo" />
                            <span class="team-name">太阳</span>
                        </strong><span class="seed">7名</span>
                    </div>
                </div>
                <div class="conn conn-playin" style="grid-row:2/4; grid-column:2;"><span class="arm-bottom"></span><span
                        class="arm-mid"></span>
                </div>
                <div class="cell" style="grid-row:2/4; grid-column:3;">
                    <div class="win-card" id="west-playin-seed7"></div>
                </div>
                <div class="cell" style="grid-row:3; grid-column:1;">
                    <div class="team-card selectable-option" data-playin-conf="west" data-playin-game="g78"
                        data-team="blazers" tabindex="0" role="button" aria-label="选择开拓者赢下西部7/8附加赛">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612757/global/L/logo.svg"
                                alt="开拓者 logo" />
                            <span class="team-name">开拓者</span>
                        </strong><span class="seed">8名</span>
                    </div>
                </div>

                <!-- g910: Clippers vs Warriors -->
                <div class="cell" style="grid-row:4; grid-column:1;">
                    <div class="team-card selectable-option is-selected" data-playin-conf="west" data-playin-game="g910"
                        data-team="clippers" tabindex="0" role="button" aria-label="选择快船赢下西部9/10附加赛">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612746/global/L/logo.svg"
                                alt="快船 logo" />
                            <span class="team-name">快船</span>
                        </strong><span class="seed">9名</span>
                    </div>
                </div>
                <div class="conn conn-playin" style="grid-row:4/6; grid-column:2;"><span class="arm-bottom"></span><span
                        class="arm-mid"></span>
                </div>
                <div class="cell" style="grid-row:4/6; grid-column:3;">
                    <div class="win-card" id="west-playin-g910"></div>
                </div>
                <div class="cell" style="grid-row:5; grid-column:1;">
                    <div class="team-card selectable-option" data-playin-conf="west" data-playin-game="g910"
                        data-team="warriors" tabindex="0" role="button" aria-label="选择勇士赢下西部9/10附加赛">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612744/global/L/logo.svg"
                                alt="勇士 logo" />
                            <span class="team-name">勇士</span>
                        </strong><span class="seed">10名</span>
                    </div>
                </div>

                <!-- g8 battle: loser(7/8) vs winner(9/10) → seed 8 -->
                <div class="cell" style="grid-row:6; grid-column:1;">
                    <div class="team-card selectable-option" id="west-playin-g8-a" data-playin-conf="west"
                        data-playin-game="g8" tabindex="0" role="button" aria-label="选择7/8败者赢下第8争夺战"></div>
                </div>
                <div class="conn conn-playin" style="grid-row:6/8; grid-column:2;"><span class="arm-bottom"></span><span
                        class="arm-mid"></span>
                </div>
                <div class="cell" style="grid-row:6/8; grid-column:3;">
                    <div class="win-card" id="west-playin-seed8"></div>
                </div>
                <div class="cell" style="grid-row:7; grid-column:1;">
                    <div class="team-card selectable-option" id="west-playin-g8-b" data-playin-conf="west"
                        data-playin-game="g8" tabindex="0" role="button" aria-label="选择910胜者赢下第8争夺战"></div>
                </div>


                <!-- ═══════════════════════════════════════
                     WEST BRACKET  (cols 5-11, rows 2-9)
                     m1: rows 2-3, m2: rows 4-5, m3: rows 6-7, m4: rows 8-9
                     ═══════════════════════════════════════ -->
                <!-- m1: Thunder(1) vs PlayIn8 -->
                <div class="cell" style="grid-row:2; grid-column:5;">
                    <div class="team-card selectable-option is-selected" data-conf="west" data-match="m1"
                        data-team="thunder" tabindex="0" role="button" aria-label="选择雷霆为西部首轮胜者">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612760/global/L/logo.svg"
                                alt="雷霆 logo" />
                            <span class="team-name">雷霆</span>
                        </strong><span class="seed">第1</span>
                    </div>
                </div>
                <div class="conn conn-r1" style="grid-row:2/4; grid-column:6;"><span class="arm-bottom"></span><span
                        class="arm-mid"></span></div>
                <div class="cell" style="grid-row:2/4; grid-column:7;">
                    <div class="win-card selectable-option is-selected" id="west-winner-m1" data-conf="west"
                        data-source="m1" data-target="s1" tabindex="0" role="button" aria-label="选择第一轮胜者进入西部第二轮"></div>
                </div>
                <div class="cell" style="grid-row:3; grid-column:5;">
                    <div class="team-card selectable-option" id="west-seed8-card" data-conf="west" data-match="m1"
                        data-team="westPlayin8" tabindex="0" role="button" aria-label="选择第8为西部首轮胜者"></div>
                </div>

                <!-- Semi connector s1: rows 2-5 -->
                <div class="conn conn-semi" id="west-semi-connector-s1" style="grid-row:2/6; grid-column:8;"><span
                        class="arm-bottom"></span><span class="arm-mid"></span></div>
                <!-- Semi winner s1: rows 2-5 -->
                <div class="cell" style="grid-row:2/6; grid-column:9;">
                    <div class="semi-card selectable-option is-selected" id="west-semi-s1" data-conf="west"
                        data-source="s1" data-target="final" tabindex="0" role="button" aria-label="选择第二轮胜者进入西部决赛">
                    </div>
                </div>

                <!-- Final connector: rows 2-9 -->
                <div class="conn conn-final" id="west-final-connector" style="grid-row:2/10; grid-column:10;"><span
                        class="arm-bottom"></span><span class="arm-mid"></span></div>
                <!-- West Conference Champion -->
                <div class="cell" style="grid-row:2/10; grid-column:11;">
                    <div class="champ-card selectable-option conference-champion conference-champion--west"
                        id="west-champion" data-league-source="west" tabindex="0" role="button" aria-label="选择西部冠军为总冠军">
                        <strong class="empty-slot">西部冠军</strong>
                    </div>
                </div>

                <!-- m2: Lakers(4) vs Rockets(5) -->
                <div class="cell" style="grid-row:4; grid-column:5;">
                    <div class="team-card selectable-option" data-conf="west" data-match="m2" data-team="lakers"
                        tabindex="0" role="button" aria-label="选择湖人为西部首轮胜者">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612747/global/L/logo.svg"
                                alt="湖人 logo" />
                            <span class="team-name">湖人</span>
                        </strong><span class="seed">第4</span>
                    </div>
                </div>
                <div class="conn conn-r1" style="grid-row:4/6; grid-column:6;"><span class="arm-bottom"></span><span
                        class="arm-mid"></span></div>
                <div class="cell" style="grid-row:4/6; grid-column:7;">
                    <div class="win-card selectable-option" id="west-winner-m2" data-conf="west" data-source="m2"
                        data-target="s1" tabindex="0" role="button" aria-label="选择第一轮胜者进入西部第二轮"></div>
                </div>
                <div class="cell" style="grid-row:5; grid-column:5;">
                    <div class="team-card selectable-option is-selected" data-conf="west" data-match="m2"
                        data-team="rockets" tabindex="0" role="button" aria-label="选择火箭为西部首轮胜者">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612745/global/L/logo.svg"
                                alt="火箭 logo" />
                            <span class="team-name">火箭</span>
                        </strong><span class="seed">第5</span>
                    </div>
                </div>

                <!-- m3: Spurs(2) vs PlayIn7 -->
                <div class="cell" style="grid-row:6; grid-column:5;">
                    <div class="team-card selectable-option is-selected" data-conf="west" data-match="m3"
                        data-team="spurs" tabindex="0" role="button" aria-label="选择马刺为西部首轮胜者">
                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612759/global/L/logo.svg"
                                alt="马刺 logo" />
                            <span class="team-name">马刺</span>
                        </strong><span class="seed">第2</span>
                    </div>
                </div>
                <div class="conn conn-r1" style="grid-row:6/8; grid-column:6;"><span class="arm-bottom"></span><span
                        class="arm-mid"></span></div>
                <div class="cell" style="grid-row:6/8; grid-column:7;">
                    <div class="win-card selectable-option" id="west-winner-m3" data-conf="west" data-source="m3"
                        data-target="s2" tabindex="0" role="button" aria-label="选择第一轮胜者进入西部第二轮"></div>
                </div>
                <div class="cell" style="grid-row:7; grid-column:5;">
                    <div class="team-card selectable-option" id="west-seed7-card" data-conf="west" data-match="m3"
                        data-team="westPlayin7" tabindex="0" role="button" aria-label="选择第7为西部首轮胜者"></div>
                </div>

                <!-- Semi connector s2: rows 6-9 -->
                <div class="conn conn-semi" id="west-semi-connector-s2" style="grid-row:6/10; grid-column:8;"><span
                        class="arm-bottom"></span><span class="arm-mid"></span></div>

                <div class="cell" style="grid-row:6/10; grid-column:9;">
                    <div class="semi-card selectable-option" id="west-semi-s2" data-conf="west" data-source="s2"
                        data-target="final" tabindex="0" role="button" aria-label="选择第二轮胜者进入西部决赛"></div>
                </div>

                <!-- m4: Nuggets(3) vs Wolves(6) -->
                <div class="cell" style="grid-row:8; grid-column:5;">
                    <div class="team-card selectable-option is-selected" data-conf="west" data-match="m4"

                        <strong class="team-line">
                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612743/global/L/logo.svg"
                                alt="掘金 logo" />

                        </strong><span class="seed">第3</span>

                </div>
                <div class="conn conn-r1" style="grid-row:8/10; grid-column:6;"><span class="arm-bottom"></span><span
                        class="arm-mid"></span></div>
                <div class="cell" style="grid-row:8/10; grid-column:7;">
                    <div class="win-card selectable-option" id="west-winner-m4" data-conf="west" data-source="m4"

                </div>
                <div class="cell" style="grid-row:9; grid-column:5;">
                    <div class="team-card selectable-option" data-conf="west" data-match="m4" data-team="wolves"

                            <img class="team-logo" src="https://cdn.nba.com/logos/nba/1610612750/global/L/logo.svg"
                                alt="森林狼 logo" />
                            <span class="team-name">森林狼</span>
                        </strong><span class="seed">第6</span>
                    </div>
                </div>

                <!-- ═══════════════════════════════════════
                     EAST BRACKET  (cols 15-21, rows 2-9)
                     Mirror: champion on left, teams on right
                     s1=['m1','m4'], s2=['m2','m3']
                     m1: rows 2-3 (Pistons vs PlayIn8)
                     m4: rows 4-5 (Cavaliers vs Raptors)
                     m2: rows 6-7 (Celtics vs PlayIn7)

            return westPlayIn.g78Winner === 'suns' ? 'blazers' : 'suns';
        }
        function getWestPlayInSeed8Candidates() {
            return [getWestPlayInLoser(), westPlayIn.g910Winner];

        function resolveTeam(teamKey) {
            if (teamKey === 'westPlayin7') return teams[westPlayIn.g78Winner];
            if (teamKey === 'westPlayin8') return teams[westPlayIn.g8Winner];
            if (teamKey === 'eastPlayin7') return teams[eastPlayIn.g78Winner];
            if (teamKey === 'eastPlayin8') return teams[eastPlayIn.g8Winner];
            return teams[teamKey];
        }

        function teamMarkup(teamKey, fallbackText) {
            if (!teamKey) return '<strong class="empty-slot">' + fallbackText + '</strong>';
            const team = resolveTeam(teamKey);
            if (!team) return '<strong class="empty-slot">' + fallbackText + '</strong>';
            if (!team.logo) return '<strong><span class="team-name">' + team.name + '</span></strong>';
            return '<strong class="team-line"><img class="team-logo" src="' + team.logo + '" alt="' + team.name + ' logo" /><span class="team-name">' + team.name + '</span></strong>';
        }

        function teamCardMarkup(teamKey, fallbackText, label) {
            const suffix = label ? '<span class="seed">' + label + '</span>' : '';
            return teamMarkup(teamKey, fallbackText) + suffix;
        }

        function normalizeWestPlayIn() {
            const candidates = getWestPlayInSeed8Candidates();
            if (!candidates.includes(westPlayIn.g8Winner)) {
                westPlayIn.g8Winner = candidates[1] || candidates[0] || null;

            const { state, ids, groups } = bracket;

            Object.entries(ids.winners).forEach(([matchKey, elementId]) => {
                document.getElementById(elementId).innerHTML = teamMarkup(state[matchKey], '首轮胜者待定');
            });

            document.getElementById(ids.semis.s1).innerHTML = teamMarkup(state.s1, '次轮胜者待定');
            document.getElementById(ids.semis.s2).innerHTML = teamMarkup(state.s2, '次轮胜者待定');
            document.getElementById(ids.champion).innerHTML = teamMarkup(state.final, ids.championFallback);

            document.querySelectorAll('[data-conf="' + conf + '"][data-match]').forEach(el => {
                el.classList.toggle('is-selected', state[el.dataset.match] === el.dataset.team);
            });

            Object.entries(ids.winners).forEach(([matchKey, elementId]) => {
                const selectedKey = groups.s1.includes(matchKey) ? state.s1 : state.s2;
                document.getElementById(elementId).classList.toggle('is-selected', !!state[matchKey] && selectedKey === state[matchKey]);
            });

            document.getElementById(ids.semis.s1).classList.toggle('is-selected', state.final === state.s1 && !!state.s1);
            document.getElementById(ids.semis.s2).classList.toggle('is-selected', state.final === state.s2 && !!state.s2);
            document.getElementById(ids.champion).classList.toggle('is-selected', leagueState.champion === state.final && !!state.final);
            updateSemiConnectors(conf);
            updateFinalConnector(conf);
        }

        function updateSemiConnectors(conf) {
            // Connectors always show both arms — no directional dimming
        }

        function updateFinalConnector(conf) {
            // Connectors always show both arms — no directional dimming
        }

        function normalizeLeagueChampion() {
            const finalists = [brackets.west.state.final, brackets.east.state.final].filter(Boolean);
            if (leagueState.champion && !finalists.includes(leagueState.champion)) {
                leagueState.champion = null;
            }
        }

        function renderLeagueChampion() {
            document.getElementById('league-champion').innerHTML = teamMarkup(leagueState.champion, '总冠军');
        }

        function normalizeConference(conf) {
            const { state, groups } = brackets[conf];
            if (conf === 'west') normalizeWestPlayIn();
            if (conf === 'east') normalizeEastPlayIn();

            const semiOneCandidates = groups.s1.map(k => state[k]);
            const semiTwoCandidates = groups.s2.map(k => state[k]);

            if (state.s1 && !semiOneCandidates.includes(state.s1)) state.s1 = semiOneCandidates[0] || null;
            if (state.s2 && !semiTwoCandidates.includes(state.s2)) state.s2 = null;
            if (state.final && ![state.s1, state.s2].includes(state.final)) state.final = null;
            normalizeLeagueChampion();
        }

        function fitBracketToViewport() {
            const section = document.querySelector('section');
            const grid = document.getElementById('bracket-grid');
            if (!section || !grid) return;

            if (window.matchMedia('(max-width: 640px)').matches) {
                grid.style.transform = '';
                section.style.minHeight = '';
                return;
            }

            grid.style.transform = 'none';
            const naturalWidth = grid.scrollWidth;

            const cs = window.getComputedStyle(section);
            const padL = parseFloat(cs.paddingLeft) || 0;
            const padR = parseFloat(cs.paddingRight) || 0;
            const contentWidth = section.clientWidth - padL - padR;
            const safeWidth = Math.max(0, contentWidth - 8);
            const scale = naturalWidth > 0 ? Math.min(1, safeWidth / naturalWidth) : 1;

            grid.style.transform = 'scale(' + scale + ')';
            section.style.minHeight = Math.ceil(grid.scrollHeight * scale + 8) + 'px';
        }

        /* ── Play-in selections ── */
        document.querySelectorAll('[data-playin-conf][data-playin-game]').forEach(el => {
            const choose = () => {
                const conf = el.dataset.playinConf;
                const game = el.dataset.playinGame;
                const team = el.dataset.team;
                if (!team) return;

                if (conf === 'west') {
                    if (game === 'g78') westPlayIn.g78Winner = team;
                    if (game === 'g910') westPlayIn.g910Winner = team;
                    if (game === 'g8') westPlayIn.g8Winner = team;
                    normalizeConference('west');
                    renderWestPlayIn();
                    renderConference('west');
                }
                if (conf === 'east') {
                    if (game === 'g78') eastPlayIn.g78Winner = team;
                    if (game === 'g910') eastPlayIn.g910Winner = team;
                    if (game === 'g8') eastPlayIn.g8Winner = team;
                    normalizeConference('east');
                    renderEastPlayIn();
                    renderConference('east');
                }
                renderLeagueChampion();
                fitBracketToViewport();
            };
            el.addEventListener('click', choose);
            el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); } });
        });

        /* ── Bracket match selections ── */
        document.querySelectorAll('[data-conf][data-match]').forEach(el => {
            const choose = () => {
                const conf = el.dataset.conf;
                brackets[conf].state[el.dataset.match] = el.dataset.team;
                normalizeConference(conf);
                renderConference(conf);
                renderLeagueChampion();
                fitBracketToViewport();
            };
            el.addEventListener('click', choose);
            el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); } });
        });

        /* ── Semi/final promotions ── */
        document.querySelectorAll('[data-conf][data-source][data-target]').forEach(el => {
            const choose = () => {
                const conf = el.dataset.conf;
                const state = brackets[conf].state;
                const source = el.dataset.source;
                const target = el.dataset.target;
                if (state[source]) state[target] = state[source];
                normalizeConference(conf);
                renderConference(conf);
                renderLeagueChampion();
                fitBracketToViewport();
            };
            el.addEventListener('click', choose);
            el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); } });
        });

        /* ── League champion selection ── */
        document.querySelectorAll('[data-league-source]').forEach(el => {
            const choose = () => {
                const champion = brackets[el.dataset.leagueSource].state.final;
                if (champion) leagueState.champion = champion;
                normalizeLeagueChampion();
                renderLeagueChampion();
                renderConference('west');
                renderConference('east');
                fitBracketToViewport();
            };
            el.addEventListener('click', choose);
            el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); } });
        });

        /* ── Initial render ── */
        renderWestPlayIn();
        renderEastPlayIn();
        renderConference('west');
        renderConference('east');
        renderLeagueChampion();
        fitBracketToViewport();
        window.addEventListener('resize', fitBracketToViewport);
    </script>
</body>

</html>
