<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA 季后赛对战图</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --card: #ffffff;
            --text: #12263a;
            --muted: #5c6b7a;
            --accent: #1f7a8c;
            --accent-2: #ff7f11;
            --line: #d6dde7;
            --line-strong: #c4cfdd;
            --surface-soft: #f8fbff;
            --shadow-soft: 0 8px 22px rgba(18, 38, 58, 0.06);
            --slot-height: 104px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #f7f9fd 0%, #ffffff 180px);
            line-height: 1.6;
        }

        .container {
            max-width: 1640px;
            margin: 0 auto;
            padding: 18px 18px 34px;
        }

        section {
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 18px;
            overflow-x: hidden;
        }

        .hint {
            margin: 0 0 10px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: max-content max-content max-content;
            gap: 12px;
            align-items: start;
            width: max-content;
            min-width: 100%;
        }

        .playin-panel {
            min-width: 220px;
        }

        .playin-panel.east-playin {
            min-width: 220px;
            padding-left: 0;
        }

        .playin-panel:not(.east-playin) {
            min-width: 206px;
        }

        .conference-title {
            margin: 0 0 10px;
            font-size: 1.06rem;
            font-weight: 700;
            line-height: 1.35;
            color: #1f3448;
            letter-spacing: 0.01em;
        }

        .playin-table {
            width: max-content;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .playin-table th,
        .playin-table td {
            border: none;
            background: transparent;
            padding: 0 5px;
            text-align: left;
            vertical-align: middle;
            font-size: 0.86rem;
            color: var(--muted);
        }

        .playin-table td {
            font-size: 1.02rem;
            color: var(--text);
        }

        .playin-arrow-cell {
            width: 24px;
            text-align: center;
            color: transparent;
            font-size: 0;
            position: relative;
            opacity: 1;
        }

        .playin-arrow-cell::before,
        .arrow-cell::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 25%;
            height: 50%;
            width: 1px;
            transform: translateX(-0.5px);
            background: rgba(31, 122, 140, 0.26);
        }

        .playin-arrow-cell::after,
        .arrow-cell::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 1px;
            transform: translateY(-0.5px);
            background: rgba(31, 122, 140, 0.34);
        }

        .arrow-cell[rowspan],
        .playin-arrow-cell[rowspan] {
            background-image:
                linear-gradient(to right, rgba(31, 122, 140, 0.34), rgba(31, 122, 140, 0.34)),
                linear-gradient(to right, rgba(31, 122, 140, 0.34), rgba(31, 122, 140, 0.34));
            background-repeat: no-repeat;
            background-size: 14px 1px, 14px 1px;
            background-position:
                calc(50% - 14px) 25%,
                calc(50% - 14px) 75%;
        }

        .bracket-wrap {
            overflow: visible;
            padding-bottom: 6px;
            min-width: 0;
            padding-left: 10px;
            padding-right: 10px;
            border-left: 1px dashed rgba(196, 207, 221, 0.75);
            border-right: 1px dashed rgba(196, 207, 221, 0.75);
            background: transparent;
            border-radius: 0;
        }

        .conference-grid {
            display: grid;
            grid-template-columns: max-content max-content max-content;
            gap: 14px;
            align-items: start;
            width: max-content;
        }

        .finals-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 152px;
            padding-top: 214px;
        }

        .league-champion {
            align-items: center;
            text-align: center;
        }

        .bracket-table {
            width: max-content;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .col-team {
            width: 118px;
        }

        .col-arrow {
            width: 24px;
        }

        .col-round {
            width: 104px;
        }

        .bracket-table th,
        .bracket-table td {
            border: none;
            background: transparent;
        }

        .bracket-table th {
            text-align: left;
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 600;
            padding: 0 5px 5px;
        }

        .bracket-table td {
            padding: 0 5px;
            vertical-align: middle;
            text-align: left;
        }

        .bracket-table tbody tr {
            height: var(--slot-height);
        }

        .conference-panel.east .bracket-table th,
        .conference-panel.east .bracket-table td {
            text-align: right;
        }

        .conference-panel.east .conference-title {
            text-align: right;
        }

        .conference-panel.east .seed {
            align-self: center;
        }

        .conference-panel.east .team-card,
        .conference-panel.east .win-card,
        .conference-panel.east .semi-card,
        .conference-panel.east .champ-card {
            align-items: flex-end;
        }

        .conference-panel.east .arrow-cell {
            text-align: center;
        }

        .conference-panel.east .arrow-cell::after,
        .playin-panel.east-playin .playin-arrow-cell::after {
            left: auto;
            right: 50%;
        }

        .conference-panel.east .arrow-cell[rowspan],
        .playin-panel.east-playin .playin-arrow-cell[rowspan] {
            background-image:
                linear-gradient(to left, rgba(31, 122, 140, 0.3), rgba(31, 122, 140, 0.3)),
                linear-gradient(to left, rgba(31, 122, 140, 0.3), rgba(31, 122, 140, 0.3));
            background-position:
                calc(50% + 6px) 25%,
                calc(50% + 6px) 75%;
        }

        .arrow-cell.is-top-only[rowspan] {
            background-image: linear-gradient(to right, rgba(31, 122, 140, 0.34), rgba(31, 122, 140, 0.34));
            background-size: 14px 1px;
            background-position: calc(50% - 14px) 25%;
        }

        .arrow-cell.is-bottom-only[rowspan] {
            background-image: linear-gradient(to right, rgba(31, 122, 140, 0.34), rgba(31, 122, 140, 0.34));
            background-size: 14px 1px;
            background-position: calc(50% - 14px) 75%;
        }

        .conference-panel.east .arrow-cell.is-top-only[rowspan] {
            background-image: linear-gradient(to left, rgba(31, 122, 140, 0.34), rgba(31, 122, 140, 0.34));
            background-position: calc(50% + 6px) 25%;
        }

        .conference-panel.east .arrow-cell.is-bottom-only[rowspan] {
            background-image: linear-gradient(to left, rgba(31, 122, 140, 0.34), rgba(31, 122, 140, 0.34));
            background-position: calc(50% + 6px) 75%;
        }

        .playin-panel.east-playin .conference-title {
            text-align: right;
            margin: 4px 4px 8px 0;
        }

        .team-card,
        .win-card,
        .semi-card,
        .champ-card {
            border: 1px solid rgba(196, 207, 221, 0.5);
            border-radius: 10px;
            background: var(--surface-soft);
            padding: 6px 10px;
            min-height: 0;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.25;
            box-shadow: var(--shadow-soft);
            width: fit-content;
            min-width: 0;
            text-align: center;
            transition: opacity 120ms ease, background-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
        }

        .team-card {
            min-height: calc(var(--slot-height) - 8px);
        }

        .playin-table .team-card,
        .playin-table .win-card {
            min-height: 0;
            padding-left: 8px;
            padding-right: 8px;
        }

        .team-line {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
        }

        .team-name {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.2;
        }

        .team-logo {
            width: 58px;
            height: 58px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .selectable-option {
            cursor: pointer;
            user-select: none;
            transition: transform 120ms ease, color 120ms ease, opacity 120ms ease;
        }

        .selectable-option:hover {
            color: var(--accent);
            transform: translateY(-1px);
        }

        .selectable-option.is-selected {
            color: var(--accent-2);
            opacity: 1;
            filter: saturate(1);
            background: rgba(255, 127, 17, 0.11);
            box-shadow: inset 0 0 0 1px rgba(255, 127, 17, 0.32), 0 6px 16px rgba(255, 127, 17, 0.16);
        }

        .selectable-option:focus-visible {
            outline: 2px solid rgba(31, 122, 140, 0.45);
            outline-offset: 2px;
        }

        .empty-slot {
            opacity: 0.8;
        }

        .team-card:has(.empty-slot),
        .win-card:has(.empty-slot),
        .semi-card:has(.empty-slot),
        .champ-card:has(.empty-slot) {
            opacity: 0.68;
            filter: none;
            background: #fbfdff;
            box-shadow: none;
        }

        .empty-slot {
            color: var(--muted);
            opacity: 0.8;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .arrow-cell {
            width: 24px;
            text-align: center;
            color: transparent;
            font-size: 0;
            position: relative;
            opacity: 1;
        }

        .seed {
            display: block;
            color: var(--muted);
            font-size: 0.8rem;
            text-align: center;
            line-height: 1.2;
        }

        @media (max-width: 640px) {
            :root {
                --slot-height: 88px;
            }

            section {
                padding: 12px;
                overflow-x: visible;
            }

            .main-layout {
                grid-template-columns: 1fr;
                gap: 16px;
                width: 100%;
                min-width: 0;
            }

            .playin-panel,
            .bracket-wrap {
                overflow-x: auto;
                overflow-y: hidden;
            }

            .conference-grid {
                grid-template-columns: max-content;
                gap: 20px;
            }

            .playin-panel {
                min-width: 0;
            }

            .playin-panel.east-playin {
                min-width: 0;
                padding-left: 0;
            }

            .finals-panel {
                padding-top: 0;
                min-width: 0;
                align-items: flex-start;
            }

            .league-champion {
                align-items: flex-start;
                text-align: left;
            }

            .conference-title {
                margin-bottom: 8px;
                font-size: 1rem;
            }

            .team-card,
            .win-card,
            .semi-card,
            .champ-card {
                padding: 6px 8px;
            }

            .team-logo {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <section>
            <div class="main-layout">
                <div class="playin-panel">
                    <p class="conference-title">西部附加赛</p>
                    <table class="playin-table" aria-label="西部附加赛树状图">

                            <tr>
                                <th>附加赛对阵</th>

                                <th>比赛结果</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="team-card selectable-option is-selected" data-playin-conf="west"

                                <td class="playin-arrow-cell" rowspan="2"></td>

                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="team-card selectable-option" data-playin-conf="west"

                                        aria-label="选择开拓者赢下西部7/8附加赛">
                                        <strong class="team-line"><img class="team-logo"
                                                src="https://cdn.nba.com/logos/nba/1610612757/global/L/logo.svg"
                                                alt="开拓者 logo" /><span class="team-name">开拓者</span></strong><span
                                            class="seed">8名</span>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="team-card selectable-option is-selected" data-playin-conf="west"

                            <tr>
                                <td>
                                    <div class="team-card selectable-option" data-playin-conf="west"

                            </tr>
                            <tr>
                                <td>
                                    <div class="team-card selectable-option" id="west-playin-g8-a"

                                </td>
                                <td class="playin-arrow-cell" rowspan="2"></td>
                                <td rowspan="2">
                                    <div class="win-card" id="west-playin-seed8"></div>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="team-card selectable-option" id="west-playin-g8-b"
                                        data-playin-conf="west" data-playin-game="g8" tabindex="0" role="button"
                                        aria-label="选择910胜者赢下第8争夺战"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="bracket-wrap">
                    <div class="conference-grid">
                        <div class="conference-panel west">
                            <p class="conference-title">西部</p>
                            <table class="bracket-table" aria-label="西部对战树">
                                <colgroup>
                                    <col class="col-team" />

                                    <col class="col-arrow" />
                                    <col class="col-round" />
                                </colgroup>
                                <thead>
                                    <tr>

                                        <th></th>

                                </thead>

                                    <tr>

                                    <tr>

            const suffix = label ? '<span class="seed">' + label + '</span>' : '';
            return teamMarkup(teamKey, fallbackText) + suffix;

        }

        function renderConference(conf) {
            const bracket = brackets[conf];
            const { state, ids, groups } = bracket;

            Object.entries(ids.winners).forEach(([matchKey, elementId]) => {
                document.getElementById(elementId).innerHTML = teamMarkup(state[matchKey], '待选择');
            });

            document.getElementById(ids.semis.s1).innerHTML = teamMarkup(state.s1, '第二轮胜者');
            document.getElementById(ids.semis.s2).innerHTML = teamMarkup(state.s2, '胜者2');
            document.getElementById(ids.champion).innerHTML = teamMarkup(state.final, ids.championFallback);

            document.querySelectorAll('[data-conf="' + conf + '"][data-match]').forEach((el) => {
                el.classList.toggle('is-selected', state[el.dataset.match] === el.dataset.team);
            });

            Object.entries(ids.winners).forEach(([matchKey, elementId]) => {
                const selectedKey = groups.s1.includes(matchKey) ? state.s1 : state.s2;
                document.getElementById(elementId).classList.toggle('is-selected', selectedKey === state[matchKey]);
            });

            document.getElementById(ids.semis.s1).classList.toggle('is-selected', state.final === state.s1 && !!state.s1);
            document.getElementById(ids.semis.s2).classList.toggle('is-selected', state.final === state.s2 && !!state.s2);
            document.getElementById(ids.champion).classList.toggle('is-selected', leagueState.champion === state.final && !!state.final);
            updateSemiConnectors(conf);
            updateFinalConnector(conf);
        }

        function updateSemiConnectors(conf) {
            const { state, ids, groups } = brackets[conf];
            const s1Connector = document.getElementById(ids.semiConnectors.s1);
            const s2Connector = document.getElementById(ids.semiConnectors.s2);
            if (!s1Connector || !s2Connector) return;

            s1Connector.classList.remove('is-top-only', 'is-bottom-only');
            s2Connector.classList.remove('is-top-only', 'is-bottom-only');

            const [s1Top, s1Bottom] = groups.s1;
            const [s2Top, s2Bottom] = groups.s2;

            if (state.s1 === state[s1Top]) s1Connector.classList.add('is-top-only');
            if (state.s1 === state[s1Bottom]) s1Connector.classList.add('is-bottom-only');
            if (state.s2 === state[s2Top]) s2Connector.classList.add('is-top-only');
            if (state.s2 === state[s2Bottom]) s2Connector.classList.add('is-bottom-only');
        }

        function updateFinalConnector(conf) {
            const { state, ids } = brackets[conf];
            const connector = document.getElementById(ids.finalConnector);
            if (!connector) return;

            connector.classList.remove('is-top-only', 'is-bottom-only');
            const chosenFinal = state.final || (conf === 'west' ? (state.s1 || state.s2) : null);
            if (!chosenFinal) return;

            if (chosenFinal === state.s1) connector.classList.add('is-top-only');
            if (chosenFinal === state.s2) connector.classList.add('is-bottom-only');
        }

        function normalizeLeagueChampion() {
            const finalists = [brackets.west.state.final, brackets.east.state.final].filter(Boolean);
            if (leagueState.champion && !finalists.includes(leagueState.champion)) {
                leagueState.champion = null;
            }
        }

        function renderLeagueChampion() {
            document.getElementById('league-champion').innerHTML = teamMarkup(leagueState.champion, '总冠军');
        }

        function normalizeConference(conf) {
            const { state, groups } = brackets[conf];
            if (conf === 'west') normalizeWestPlayIn();
            if (conf === 'east') normalizeEastPlayIn();

            const semiOneCandidates = groups.s1.map((k) => state[k]);
            const semiTwoCandidates = groups.s2.map((k) => state[k]);

            if (state.s1 && !semiOneCandidates.includes(state.s1)) state.s1 = semiOneCandidates[0] || null;
            if (state.s2 && !semiTwoCandidates.includes(state.s2)) state.s2 = null;
            if (state.final && ![state.s1, state.s2].includes(state.final)) state.final = null;
            normalizeLeagueChampion();
        }

        function fitBracketToViewport() {
            const section = document.querySelector('section');
            const layout = document.querySelector('.main-layout');
            if (!section || !layout) return;

            if (window.matchMedia('(max-width: 640px)').matches) {
                layout.style.transform = '';
                layout.style.transformOrigin = '';
                section.style.minHeight = '';
                return;
            }

            layout.style.transform = 'none';
            layout.style.transformOrigin = 'top left';

            const naturalWidth = layout.scrollWidth;
            const sectionStyle = window.getComputedStyle(section);
            const paddingLeft = parseFloat(sectionStyle.paddingLeft) || 0;
            const paddingRight = parseFloat(sectionStyle.paddingRight) || 0;
            const contentWidth = section.clientWidth - paddingLeft - paddingRight;
            const safeWidth = Math.max(0, contentWidth - 8);
            const scale = naturalWidth > 0 ? Math.min(1, safeWidth / naturalWidth) : 1;

            layout.style.transform = 'scale(' + scale + ')';
            section.style.minHeight = Math.ceil(layout.scrollHeight * scale + 8) + 'px';
        }

        document.querySelectorAll('[data-playin-conf][data-playin-game]').forEach((el) => {
            const choose = () => {
                const conf = el.dataset.playinConf;
                const game = el.dataset.playinGame;
                const team = el.dataset.team;
                if (!team) return;

                if (conf === 'west') {
                    if (game === 'g78') westPlayIn.g78Winner = team;
                    if (game === 'g910') westPlayIn.g910Winner = team;
                    if (game === 'g8') westPlayIn.g8Winner = team;
                    normalizeConference('west');
                    renderWestPlayIn();
                    renderConference('west');
                }

                if (conf === 'east') {
                    if (game === 'g78') eastPlayIn.g78Winner = team;
                    if (game === 'g910') eastPlayIn.g910Winner = team;
                    if (game === 'g8') eastPlayIn.g8Winner = team;
                    normalizeConference('east');
                    renderEastPlayIn();
                    renderConference('east');
                }

                renderLeagueChampion();
                fitBracketToViewport();
            };

            el.addEventListener('click', choose);
            el.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    choose();
                }
            });
        });

        document.querySelectorAll('[data-conf][data-match]').forEach((el) => {
            const choose = () => {
                const conf = el.dataset.conf;
                brackets[conf].state[el.dataset.match] = el.dataset.team;
                normalizeConference(conf);
                renderConference(conf);
                renderLeagueChampion();
                fitBracketToViewport();
            };

            el.addEventListener('click', choose);
            el.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    choose();
                }
            });
        });

        document.querySelectorAll('[data-conf][data-source][data-target]').forEach((el) => {
            const choose = () => {
                const conf = el.dataset.conf;
                const state = brackets[conf].state;
                const source = el.dataset.source;
                const target = el.dataset.target;

                if (state[source]) state[target] = state[source];

                normalizeConference(conf);
                renderConference(conf);
                renderLeagueChampion();
                fitBracketToViewport();
            };

            el.addEventListener('click', choose);
            el.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    choose();
                }
            });
        });

        document.querySelectorAll('[data-league-source]').forEach((el) => {
            const choose = () => {
                const champion = brackets[el.dataset.leagueSource].state.final;
                if (champion) leagueState.champion = champion;
                normalizeLeagueChampion();
                renderLeagueChampion();
                renderConference('west');
                renderConference('east');
                fitBracketToViewport();
            };

            el.addEventListener('click', choose);
            el.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    choose();
                }
            });
        });

        renderWestPlayIn();
        renderEastPlayIn();
        renderConference('west');
        renderConference('east');
        renderLeagueChampion();
        fitBracketToViewport();
        window.addEventListener('resize', fitBracketToViewport);
    </script>
</body>

</html>
